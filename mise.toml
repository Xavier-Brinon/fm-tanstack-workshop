# Project toolchain — pinned to concrete versions so every machine and CI
# resolves the SAME tools. This is the reproducible counterpart to the global
# ~/.config/mise/config.toml (which uses "latest").
#
#   mise install            -> materialise exactly these versions
#   mise use node@latest    -> bump a pin and rewrite this file
#   mise current            -> show what's active in this directory
[tools]
node = "26.3.1"    # current Node line
aube = "1.25.0"    # jdx's Rust package manager: aube / aubr / aubx
dotenvx = "1.75.1" # encrypted .env loader: `dotenvx run -- <cmd>` decrypts + injects

# Env is loaded by dotenvx (see the `dotenvx run` wrappers in package.json),
# NOT by mise. With an encrypted .env, a mise `[env] _.file = ".env"` would
# inject the ciphertext verbatim, so it is intentionally absent.
